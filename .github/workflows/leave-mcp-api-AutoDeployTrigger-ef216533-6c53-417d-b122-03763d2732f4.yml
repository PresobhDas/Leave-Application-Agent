name: Trigger auto deployment for leave-mcp-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: [main]
    paths:
      - "mcp_func/**"

  # Allow manual trigger
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Docker login to ACR
        run: |
          echo "${{ secrets.LEAVEAGENTAPI_REGISTRY_PASSWORD }}" | docker login ${{ secrets.LEAVEAGENTAPI_REGISTRY_URL }} \
            --username "${{ secrets.LEAVEAGENTAPI_REGISTRY_USERNAME }}" \
            --password-stdin

      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.LEAVEMCPAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.LEAVEMCPAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.LEAVEMCPAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: mcp_func/Dockerfile
          acrName: ${{ secrets.LEAVEAGENTAPI_ACR_NAME }}
          acrUsername: ${{ secrets.LEAVEAGENTAPI_REGISTRY_USERNAME }}
          acrPassword: ${{ secrets.LEAVEAGENTAPI_REGISTRY_PASSWORD }}
          containerAppName: leave-mcp-api
          resourceGroup: presobh-group
          imageToBuild: ${{ secrets.LEAVEAGENTAPI_REGISTRY_URL }}/leave-mcp-api:${{ github.sha }}
