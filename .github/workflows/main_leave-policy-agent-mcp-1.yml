# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - leave-policy-agent

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # AZURE_FUNCTIONAPP_PACKAGE_PATH: './api_func' # set this to the path to your web app project, defaults to the repository root
  PYTHON_VERSION: "3.13" # set this to the python version to use (supports 3.6, 3.7, 3.8)_

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Compile requirements.txt from pyproject.toml
        run: |
          uv pip compile pyproject.toml -o requirements.txt

      - name: Build package - api_func
        run: |
          cp requirements.txt api_func/
          cp -r utils api_func/
          cd api_func
          zip -r ../release_api.zip . -x "__pycache__/*"

      - name: Build package - mcp_func
        run: |
          cp requirements.txt mcp_func/
          cp -r utils mcp_func/
          cd mcp_func
          python -m pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          zip -r ../release_mcp.zip . -x "__pycache__/*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_87735683EF9C4445BB29876EADDD5A93 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7FF7B2E8CDAE4DDA9648D1D6C05CF5AD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_91D9D55183AB440E911110457D6041C3 }}

      - name: "Deploy MCP function"
        uses: Azure/functions-action@v1
        id: deploy-mcp-function
        with:
          app-name: "leave-policy-agent-mcp-1"
          # slot-name: "Production"
          package: release_mcp.zip
