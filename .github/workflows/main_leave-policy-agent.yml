# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - leave-policy-agent

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # AZURE_FUNCTIONAPP_PACKAGE_PATH: './api_func' # set this to the path to your web app project, defaults to the repository root
  PYTHON_VERSION: "3.12" # set this to the python version to use (supports 3.6, 3.7, 3.8)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Compile requirements.txt from pyproject.toml
        run: |
          uv pip compile pyproject.toml -o requirements.txt

      - name: Build package - api_func
        run: |
          cp requirements.txt api_func/
          cd api_func
          python -m pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          zip -r ../release_api.zip . -x "__pycache__/*"

      - name: Build package - mcp_func
        run: |
          cp requirements.txt mcp_func/
          cd mcp_func
          python -m pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          zip -r ../release_mcp.zip . -x "__pycache__/*"

        # - name: Upload artifact for deployment job
        #   uses: actions/upload-artifact@v4
        #   with:
        #     name: python-app
        #     path: |
        #       release_api.zip
        #       release_mcp.zip
        #     retention-days: 1

        # deploy:
        # runs-on: ubuntu-latest
        # needs: build
        # permissions:
        #   id-token: write #This is required for requesting the JWT
        #   contents: read #This is required for actions/checkout

      # steps:
      # - name: Download artifact from build job
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7063C4A9ACB847E2A7B9204778560AD1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D3364DE3020246508A5A1A7C627C4BFC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DC49250B7A774CF9A6BBD0D8662C8A14 }}

      - name: "Deploy API function"
        uses: Azure/functions-action@v1
        id: deploy-api-function
        with:
          app-name: "leave-policy-agent"
          slot-name: "Production"
          package: release_api.zip

      - name: "Deploy MCP function"
        uses: Azure/functions-action@v1
        id: deploy-mcp-function
        with:
          app-name: "leave-policy-agent-mcp"
          slot-name: "Production"
          package: release_mcp.zip
